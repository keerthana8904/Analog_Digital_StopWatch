<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analog Digital Clock</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="container">
      <h1>MY CLOCK</h1>
      <div id="clock">
        <div class="hand hourHand" id="hour"></div>
        <div class="hand minuteHand" id="minute"></div>
        <div class="hand secondHand" id="second"></div>
      </div>
      <div id="btns"></div>
    </div>
    <script src="./script.js"></script>
  </body>
</html>
