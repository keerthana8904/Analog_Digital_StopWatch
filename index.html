<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analog Digital Clock</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <!-- analog clock -->
    <section id="analogClock">
      <h1>CLOCK</h1>
      <div id="clock">
        <div class="hand hourHand" id="hour"></div>
        <div class="hand minuteHand" id="minute"></div>
        <div class="hand secondHand" id="second"></div>
        <div class="box">
          <div class="digiHour" id="dHour"></div>
          <div class="digiMIn" id="dMin"></div>
          <div class="digiSec" id="dSec"></div>
        </div>
      </div>

      <div class="startStop">
        <button class="btn start" id="start">Start</button>
        <button class="btn stop" id="stop">Stop</button>
      </div>
    </section>

    <!-- stop watch -->
    <section class="timer">
      <h2>STOP WATCH</h2>
      <div class="timerBox">
        <div class="TimerHour" id="THour"></div>
        <div class="TimerMIn" id="TMin"></div>
        <div class="TimerSec" id="TSec"></div>
      </div>

      <div class="btns">
        <button type="button" class="btn start" id="TimerStart">Start</button>
        <button type="button" class="btn reset" id="TimeReset">Reset</button>
        <button type="button" class="btn stop" id="TimerStop">pause</button>
      </div>
    </section>

    <!-- COUNTDOWN TIMER -->
    <section class="countdown">
      <h2>TIMER</h2>

      <div class="timerBox">
        <div id="CHour">00</div>
        <div id="CMin">00</div>
        <div id="CSec">00</div>
      </div>

      <div class="btns">
        <button id="CountdownStart" class="btn start">Start</button>
        <button id="CountdownStop" class="btn stop">Pause</button>
        <button id="CountdownReset" class="btn reset">Reset</button>
      </div>

      <div class="addTimer">
        <input
          type="number"
          id="Hourtimer"
          placeholder="Hours"
          min="1"
          max="12"
        />
        <input
          type="number"
          id="Mintimer"
          placeholder="Minutes"
          min="1"
          max="60"
        />
      </div>
    </section>
    <div></div>
    <script src="./script.js"></script>
  </body>
</html>
